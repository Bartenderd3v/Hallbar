.hidden{display:none!important}

/* ═══ NAV BAR ═══ */
.nav{position:sticky;top:0;z-index:100;display:flex;border-bottom:1px solid #e0ddd8}

/* ═══ LIGHT THEME (guest) ═══ */

.light .si{color:#aaa}
.light .card{background:#fff;border:1px solid #e8e6e2;border-radius:14px;margin-bottom:8px}
.light .card.open{border-color:#ccc}
.light .cn{color:#1a1a1a}
.light .cdesc{color:#888}
.light .price{color:#c0392b}
.light .sep{background:#f0eee8}
.light .ir{border-color:#f5f3ef}
.light .amt{color:#999}
.light .sct{color:#bbb}

.dark .nav{background:#09091a;border-color:#2a2a48}
.dark .nav-btn{background:#09091a;color:#555}

var SPIRITS=['Джин','Бурбон','Виски','Водка','Текила','Вермут','Амаро','Апероль','Ликёр юзу','Ликёр шисо'];
var TASTES=['свежий','кислый','сладкий','горький','игристый','ягодный','крепкий','солёный','острый'];
var activeTaste=null,activeSpirit=null,openCard=null;

function norm(s){return(s||'').toLowerCase().replace(/\u0451/g,'\u0435');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildMenuCard(d,isStaff){
  var card=document.createElement('div');
  card.className='card';
  var sub=d.s?' <span style="font-weight:400;opacity:.5;font-size:14px">\u00b7 '+esc(d.s)+'</span>':'';
  var tasteTags='';
  if(!isStaff){for(var j=0;j<d.taste.length;j++)tasteTags+='<span class="tag t-taste">'+d.taste[j]+'</span>';}
  var head=document.createElement('div');
  head.className='card-head';
  head.innerHTML='<div class="hm"><div class="cn">'+esc(d.n)+sub+'</div>'+(d.desc?'<div class="cdesc">'+esc(d.desc)+'</div>':'')+'</div><div class="hr"><div class="price">'+d.p+' \u20bd</div><div class="tags"><span class="tag t-sp">'+esc(d.sp)+'</span><span class="tag t-gl">'+esc(d.gl)+'</span>'+tasteTags+'</div></div><span class="arr">\u203a</span>';
  var ingsHtml='';
  for(var k=0;k<d.i.length;k++)ingsHtml+='<div class="ir"><span>'+esc(d.i[k][0])+'</span><span class="amt">'+esc(d.i[k][1])+'</span></div>';
  var stepsHtml='';
  if(isStaff&&d.st){stepsHtml='<div class="sep"></div><div class="sec"><div class="sct">Приготовление</div><ul style="list-style:none">';for(var m=0;m<d.st.length;m++)stepsHtml+='<li style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid;font-size:13px"><span style="flex-shrink:0;width:18px;height:18px;background:#e94560;color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">'+(m+1)+'</span><span>'+esc(d.st[m])+'</span></li>';stepsHtml+='</ul></div>';}
  var likeHtml=(!isStaff&&d.like)?'<div class="similar"><b>Если нравится — попробуйте</b>'+esc(d.like)+'</div>':'';
  var body=document.createElement('div');
  body.className='body';
  body.innerHTML='<div class="sep"></div><div class="sec"><div class="sct">Состав</div>'+ingsHtml+'<div style="display:flex;justify-content:space-between;padding:6px 10px;margin-top:6px;background:rgba(128,128,128,.07);border-radius:8px;font-size:12px;opacity:.7"><span>Выход</span><b>'+d.y+' мл \u00b7 '+esc(d.gl)+'</b></div></div>'+stepsHtml+likeHtml;
  card.appendChild(head);card.appendChild(body);
  head.onclick=function(){var o=card.className.indexOf('open')>=0;if(openCard&&openCard!==card)openCard.className=openCard.className.replace(' open','');if(o){card.className=card.className.replace(' open','');openCard=null;}else{card.className+=' open';openCard=card;}};
  card.setAttribute('data-search',norm(d.n+' '+d.s+' '+d.sp+' '+(d.desc||'')+' '+d.taste.join(' ')+' '+d.i.map(function(r){return r[0];}).join(' ')));
  card.setAttribute('data-str',d.str);
  return card;
}

function renderMenu(isStaff){
  var q=norm(document.getElementById('q').value);
  document.getElementById('sx').style.display=q?'block':'none';
  var listEl=document.getElementById('menu-list');
  listEl.innerHTML='';openCard=null;var shown=0;
  for(var i=0;i<COCKTAILS.length;i++){
    var d=COCKTAILS[i];
    var card=buildMenuCard(d,isStaff);
    var mq=!q||card.getAttribute('data-search').indexOf(q)>=0;
    var ms=!activeSpirit||d.sp===activeSpirit;
    var mt=!activeTaste||d.taste.indexOf(activeTaste)>=0;
    if(mq&&ms&&mt){listEl.appendChild(card);shown++;}
  }
  document.getElementById('nr').style.display=shown===0?'block':'none';
}

function makeChips(arr,containerId,type){
  var el=document.getElementById(containerId);if(!el)return;
  for(var i=0;i<arr.length;i++){(function(val){
    var b=document.createElement('button');b.className='chip';b.textContent=val;b.type='button';
    b.onclick=function(){if(type==='taste'){activeTaste=(activeTaste===val)?null:val;}else{activeSpirit=(activeSpirit===val)?null:val;}var all=el.querySelectorAll('.chip');var active=type==='taste'?activeTaste:activeSpirit;for(var j=0;j<all.length;j++)all[j].className=all[j].textContent===active?'chip on':'chip';renderMenu(!!currentProfile);};
    el.appendChild(b);
  })(arr[i]);}
}

function showGuest(){
  var theme='light';
  app.className=theme;
  app.innerHTML='<div class="nav"><button class="nav-btn on" type="button">Коктейли</button></div><div class="hdr"><div class="logo">Холл <em>\u00b7 коктейли</em></div><div class="sw"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" id="q" placeholder="Название или ингредиент\u2026" autocomplete="off" autocorrect="off" spellcheck="false"><button class="sx" id="sx" type="button">\u00d7</button></div><div class="chips" id="taste-chips"></div><div class="chips" id="spirit-chips" style="margin-top:4px"></div></div><div class="norezultat" id="nr">Ничего не нашлось</div><div class="list" id="menu-list"></div><div class="staff-link" id="staff-link">Для сотрудников</div>';
  activeTaste=null;activeSpirit=null;
  makeChips(TASTES,'taste-chips','taste');
  makeChips(SPIRITS,'spirit-chips','spirit');
  document.getElementById('q').addEventListener('input',function(){renderMenu(false);});
  document.getElementById('sx').addEventListener('click',function(){document.getElementById('q').value='';this.style.display='none';renderMenu(false);});
  document.getElementById('staff-link').addEventListener('click',function(){showLogin();});
  renderMenu(false);
}

function showLogin(){
  app.className='';
  app.innerHTML='<div class="login-page"><div class="login-box"><h2>Вход для сотрудников</h2><p>Введи данные от аккаунта</p><label>Email</label><input type="email" id="l-email" autocomplete="email"><label>Пароль</label><input type="password" id="l-pass" autocomplete="current-password"><button class="login-btn" id="l-btn" type="button">Войти</button><div class="login-err" id="l-err"></div><div class="login-back" id="l-back">\u2190 Назад к меню</div></div></div>';
  document.getElementById('l-btn').addEventListener('click',doLogin);
  document.getElementById('l-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('l-back').addEventListener('click',function(){showGuest();});
}

function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  var btn=document.getElementById('l-btn');
  var err=document.getElementById('l-err');
  if(!email||!pass){err.textContent='Заполни оба поля';return;}
  btn.disabled=true;err.textContent='';
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(res){
    if(res.error){err.textContent=res.error.message;btn.disabled=false;return;}
    currentUser=res.data.user;
    loadProfile();
  });
}

function loadProfile(){
  sb.from('profiles').select('*').eq('id',currentUser.id).single().then(function(res){
    if(res.error||!res.data){currentProfile={name:'Сотрудник',role:'bartender'};}
    else{currentProfile=res.data;}
    showStaff();
  });
}

function showStaff(){
  var isManager=currentProfile&&currentProfile.role==='manager';
  app.className='dark';
  var navHtml='<div class="nav"><button class="nav-btn on" data-tab="menu" type="button">Рецепты</button>'+(isManager?'<button class="nav-btn" data-tab="admin" type="button">Управление</button>':'')+'<button class="nav-btn" data-tab="logout" type="button">Выход</button></div>';
  app.innerHTML=navHtml+'<div class="user-bar"><span>'+esc(currentProfile.name)+'</span><span>'+esc(currentProfile.role==='manager'?'Управляющий':'Бармен')+'</span></div><div id="view-container"></div>';
  var btns=app.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++){btns[i].addEventListener('click',function(){
    var tab=this.getAttribute('data-tab');
    if(tab==='logout'){doLogout();return;}
    currentTab=tab;
    for(var j=0;j<btns.length;j++)btns[j].className='nav-btn'+(btns[j].getAttribute('data-tab')===currentTab?' on':'');
    renderStaffView();
  });}
  currentTab='menu';renderStaffView();
}

function renderStaffView(){
  var container=document.getElementById('view-container');
  if(currentTab==='menu'){
    container.innerHTML='<div class="hdr"><div class="logo">Бар <em>\u00b7 Холл</em></div><div class="sw"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" id="q" placeholder="Название, ингредиент\u2026" autocomplete="off" autocorrect="off" spellcheck="false"><button class="sx" id="sx" type="button">\u00d7</button></div><div class="chips" id="spirit-chips"></div></div><div class="norezultat" id="nr">Ничего не найдено</div><div class="list" id="menu-list"></div>';
    activeTaste=null;activeSpirit=null;
    makeChips(SPIRITS,'spirit-chips','spirit');
    document.getElementById('q').addEventListener('input',function(){renderMenu(true);});
    document.getElementById('sx').addEventListener('click',function(){document.getElementById('q').value='';this.style.display='none';renderMenu(true);});
    renderMenu(true);
  } else if(currentTab==='admin'){
    showAdmin(container);
  }
}

function showAdmin(container){
  container.innerHTML='<div class="admin-page"><h2>Управление</h2><div class="admin-card"><h3>Добавить бармена</h3><label>Имя</label><input type="text" id="a-name"><label>Email</label><input type="email" id="a-email"><label>Пароль</label><input type="text" id="a-pass" value="hall'+Math.floor(1000+Math.random()*9000)+'"><button class="admin-btn" id="a-btn" type="button">Создать аккаунт</button><div class="admin-msg" id="a-msg"></div></div><div class="admin-card"><h3>Сотрудники</h3><div class="staff-list" id="staff-list">Загрузка...</div></div></div>';
  document.getElementById('a-btn').addEventListener('click',createBartender);
  loadStaffList();
}

function createBartender(){
  var name=document.getElementById('a-name').value.trim();
  var email=document.getElementById('a-email').value.trim();
  var pass=document.getElementById('a-pass').value.trim();
  var msg=document.getElementById('a-msg');
  if(!name||!email||!pass){msg.textContent='Заполни все поля';msg.style.color='#e94560';return;}
  msg.textContent='Создаём...';msg.style.color='#888';
  sb.auth.signUp({email:email,password:pass,options:{data:{name:name,role:'bartender'}}}).then(function(res){
    if(res.error){msg.textContent=res.error.message;msg.style.color='#e94560';return;}
    var uid=res.data.user.id;
    sb.from('profiles').insert({id:uid,name:name,role:'bartender'}).then(function(r2){
      if(r2.error){msg.textContent='Юзер создан, но профиль не записался: '+r2.error.message;msg.style.color='#f7a440';}
      else{msg.textContent='Готово! Логин: '+email+' / '+pass;msg.style.color='#1D9E75';document.getElementById('a-name').value='';document.getElementById('a-email').value='';document.getElementById('a-pass').value='hall'+Math.floor(1000+Math.random()*9000);loadStaffList();}
    });
  });
}

function loadStaffList(){
  var el=document.getElementById('staff-list');
  sb.from('profiles').select('*').order('created_at').then(function(res){
    if(res.error){el.textContent='Ошибка: '+res.error.message;return;}
    if(!res.data||res.data.length===0){el.textContent='Пока никого';return;}
    var html='';
    for(var i=0;i<res.data.length;i++){
      var p=res.data[i];
      html+='<div class="staff-item"><span>'+esc(p.name)+'</span><span class="staff-role">'+esc(p.role==='manager'?'Управляющий':'Бармен')+'</span></div>';
    }
    el.innerHTML=html;
  });
}

function doLogout(){
  sb.auth.signOut().then(function(){
    currentUser=null;currentProfile=null;showGuest();
  });
}

// ═══ INIT ═══
sb.auth.getSession().then(function(res){
  if(res.data.session){
    currentUser=res.data.session.user;
    loadProfile();
  } else {
    showGuest();
  }
});
</script>
