]}];
var SPIRITS=['Джин','Бурбон','Виски','Водка','Текила','Вермут','Амаро','Апероль','Ликёр'];
var TASTES=['свежий','кислый','сладкий','горький','игристый','ягодный','крепкий','солёный','острый'];
function norm(s){return(s||'').toLowerCase().replace(/\u0451/g,'\u0435');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function starsHtml(v){var h='<span class="item-str">';for(var i=1;i<=5;i++)h+='<span'+(i<=v?' class="on"':'')+'>&#9733;</span>';return h+'</span>';}
function menuHdr(){return '<div class="sw"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" id="q" placeholder="Найти коктейль\u2026" autocomplete="off" autocorrect="off" spellcheck="false"><button class="sx" id="sx" type="button">\u00d7</button></div><div class="filter-bar" id="sp-chips"></div><div class="filter-bar" id="ta-chips" style="margin-top:2px"></div><div class="stars-bar"><span class="stars-label">Крепость</span><span class="star" data-v="1">&#9733;</span><span class="star" data-v="2">&#9733;</span><span class="star" data-v="3">&#9733;</span><span class="star" data-v="4">&#9733;</span><span class="star" data-v="5">&#9733;</span><span class="stars-text" id="str-text">любая</span></div>';}
function renderMenu(isStaff){
  var q=norm(document.getElementById('q').value);
  document.getElementById('sx').style.display=q?'block':'none';
  var el=document.getElementById('mc');el.innerHTML='';var total=0;
  for(var s=0;s<SECS.length;s++){var sec=SECS[s];var items=[];
    for(var i=0;i<sec.items.length;i++){var d=sec.items[i];
      if((!q||norm(d.n+' '+d.comp+' '+d.sp+' '+d.taste.join(' ')).indexOf(q)>=0)&&(!activeSpirit||d.sp===activeSpirit)&&(!activeTaste||d.taste.indexOf(activeTaste)>=0)&&(activeStr===0||d.str===activeStr))items.push(d);}
    if(items.length>0){var t=document.createElement('div');t.className='section-title';t.textContent=sec.title;el.appendChild(t);
      for(var j=0;j<items.length;j++){var d=items[j];var div=document.createElement('div');div.className='item';
        var dr='';for(var k=0;k<d.i.length;k++)dr+='<div class="detail-row"><span>'+esc(d.i[k][0])+'</span>'+(isStaff?'<span>'+esc(d.i[k][1])+'</span>':'')+'</div>';
        var sh='';if(isStaff&&d.st){sh='<ul class="steps-list">';for(var m=0;m<d.st.length;m++)sh+='<li><span class="sn">'+(m+1)+'</span><span>'+esc(d.st[m])+'</span></li>';sh+='</ul>';}
        var rh=(!isStaff&&d.like)?'<div class="rec">\u0412\u0430\u043c \u043f\u043e\u043d\u0440\u0430\u0432\u0438\u0442\u0441\u044f, \u0435\u0441\u043b\u0438 \u0432\u044b \u043b\u044e\u0431\u0438\u0442\u0435 <strong>'+esc(d.like)+'</strong></div>':'';
        div.innerHTML='<div class="item-top"><span class="item-name">'+esc(d.n)+'</span><span class="item-price">'+d.p+'</span></div><div class="item-comp">'+esc(d.comp)+'</div><div class="item-vol">'+starsHtml(d.str)+'</div><div class="item-detail"><div class="item-detail-inner">'+dr+sh+rh+'</div></div>';
        div.addEventListener('click',function(){var o=this.className.indexOf('open')>=0;var p=document.querySelector('.item.open');if(p&&p!==this)p.className='item';this.className=o?'item':'item open';});
        el.appendChild(div);total++;}}}
  document.getElementById('nr').style.display=total===0?'block':'none';
}
function setupMenu(isStaff){
  activeSpirit=null;activeTaste=null;activeStr=0;
  var el,arr,type;
  el=document.getElementById('sp-chips');if(el)for(var i=0;i<SPIRITS.length;i++){(function(v){var b=document.createElement('button');b.className='ft';b.textContent=v;b.type='button';b.onclick=function(){activeSpirit=(activeSpirit===v)?null:v;var a=el.querySelectorAll('.ft');for(var j=0;j<a.length;j++)a[j].className=a[j].textContent===activeSpirit?'ft on':'ft';renderMenu(isStaff);};el.appendChild(b);})(SPIRITS[i]);}
  el=document.getElementById('ta-chips');if(el)for(var i=0;i<TASTES.length;i++){(function(v){var b=document.createElement('button');b.className='ft';b.textContent=v;b.type='button';b.onclick=function(){activeTaste=(activeTaste===v)?null:v;var a=el.querySelectorAll('.ft');for(var j=0;j<a.length;j++)a[j].className=a[j].textContent===activeTaste?'ft on':'ft';renderMenu(isStaff);};el.appendChild(b);})(TASTES[i]);}
  document.getElementById('q').addEventListener('input',function(){renderMenu(isStaff);});
  document.getElementById('sx').addEventListener('click',function(){document.getElementById('q').value='';this.style.display='none';renderMenu(isStaff);});
  var stars=document.querySelectorAll('.star');for(var i=0;i<stars.length;i++){(function(idx){stars[idx].addEventListener('click',function(){var v=parseInt(this.getAttribute('data-v'));activeStr=(activeStr===v)?0:v;for(var j=0;j<stars.length;j++)stars[j].className=(j<activeStr)?'star filled':'star';document.getElementById('str-text').textContent=activeStr===0?'любая':activeStr<=2?'лёгкие':activeStr<=3?'средние':'крепкие';renderMenu(isStaff);});})(i);}
  renderMenu(isStaff);
}
function showGuest(){app.className='light';app.innerHTML='<div class="hdr"><div class="logo">HALL<em>bar \u00b7 коктейли</em></div>'+menuHdr()+'</div><div class="norezultat" id="nr">Ничего не нашлось</div><div class="content" id="mc"></div><div class="footer-info">Hall \u2014 уютный диджей бар,<br>созданный единомышленниками<br>как место для концертов и арт-проектов.</div><div class="staff-link" id="sl">Для сотрудников</div>';document.getElementById('sl').addEventListener('click',showLogin);setupMenu(false);}
function showLogin(){app.className='';app.innerHTML='<div class="login-page"><div class="login-box"><h2>Вход для сотрудников</h2><p>Введи данные от аккаунта</p><label>Email</label><input type="email" id="le" autocomplete="email"><label>Пароль</label><input type="password" id="lp" autocomplete="current-password"><button class="login-btn" id="lb" type="button">Войти</button><div class="login-err" id="lerr"></div><div class="login-back" id="lbk">\u2190 Назад к меню</div></div></div>';document.getElementById('lb').addEventListener('click',doLogin);document.getElementById('lp').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});document.getElementById('lbk').addEventListener('click',showGuest);}
function doLogin(){var e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value,b=document.getElementById('lb'),er=document.getElementById('lerr');if(!e||!p){er.textContent='Заполни оба поля';return;}b.disabled=true;er.textContent='';sb.auth.signInWithPassword({email:e,password:p}).then(function(r){if(r.error){er.textContent=r.error.message;b.disabled=false;return;}currentUser=r.data.user;loadProfile();});}
function loadProfile(){sb.from('profiles').select('*').eq('id',currentUser.id).maybeSingle().then(function(r){currentProfile=(r.data&&r.data.role)?r.data:{name:currentUser.email,role:'bartender'};showStaff();});}
function showStaff(){var isM=currentProfile&&currentProfile.role==='manager';app.className='dark';var tabs='<div class="nav"><button class="nav-btn on" data-tab="menu" type="button">Рецепты</button>';if(isM)tabs+='<button class="nav-btn" data-tab="admin" type="button">Управление</button>';tabs+='<button class="nav-btn" data-tab="logout" type="button">Выход</button></div>';app.innerHTML=tabs+'<div class="user-bar"><span>'+esc(currentProfile.name)+'</span><span>'+(isM?'Управляющий':'Бармен')+'</span></div><div id="vw"></div>';var btns=app.querySelectorAll('.nav-btn');for(var i=0;i<btns.length;i++){btns[i].addEventListener('click',function(){var t=this.getAttribute('data-tab');if(t==='logout'){doLogout();return;}currentTab=t;for(var j=0;j<btns.length;j++)btns[j].className='nav-btn'+(btns[j].getAttribute('data-tab')===currentTab?' on':'');renderView();});}currentTab='menu';renderView();}
function renderView(){var v=document.getElementById('vw');if(currentTab==='menu'){v.innerHTML='<div class="hdr"><div class="logo">Бар <em>\u00b7 Холл</em></div>'+menuHdr()+'</div><div class="norezultat" id="nr">Ничего не найдено</div><div class="content" id="mc"></div>';setupMenu(true);}else if(currentTab==='admin'){showAdmin(v);}}
function showAdmin(v){v.innerHTML='<div class="admin-page"><h2>Управление</h2><div class="admin-card"><h3>Добавить бармена</h3><label>Имя</label><input type="text" id="an"><label>Email</label><input type="email" id="ae"><label>Пароль</label><input type="text" id="ap" value="hall'+Math.floor(1000+Math.random()*9000)+'"><button class="admin-btn" id="ab" type="button">Создать аккаунт</button><div class="admin-msg" id="am"></div></div><div class="admin-card"><h3>Сотрудники</h3><div id="sl2">Загрузка...</div></div></div>';document.getElementById('ab').addEventListener('click',createBartender);loadStaffList();}
function createBartender(){var n=document.getElementById('an').value.trim(),e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value.trim(),m=document.getElementById('am');if(!n||!e||!p){m.textContent='Заполни все поля';m.style.color='#e94560';return;}m.textContent='Создаём...';m.style.color='#888';sb.auth.signUp({email:e,password:p,options:{data:{name:n,role:'bartender'}}}).then(function(r){if(r.error){m.textContent=r.error.message;m.style.color='#e94560';return;}var uid=r.data.user.id;sb.from('profiles').insert({id:uid,name:n,role:'bartender'}).then(function(r2){if(r2.error){m.textContent='Юзер создан, профиль: '+r2.error.message;m.style.color='#f7a440';}else{m.textContent='Готово! '+e+' / '+p;m.style.color='#1D9E75';document.getElementById('an').value='';document.getElementById('ae').value='';document.getElementById('ap').value='hall'+Math.floor(1000+Math.random()*9000);loadStaffList();}});});}
function loadStaffList(){var el=document.getElementById('sl2');sb.from('profiles').select('*').order('created_at').then(function(r){if(r.error){el.textContent='Ошибка: '+r.error.message;return;}if(!r.data||!r.data.length){el.textContent='Пока никого';return;}var h='';for(var i=0;i<r.data.length;i++){var p=r.data[i];h+='<div class="staff-item"><span>'+esc(p.name)+'</span><span class="staff-role">'+(p.role==='manager'?'Управляющий':'Бармен')+'</span></div>';}el.innerHTML=h;});}
function doLogout(){sb.auth.signOut().then(function(){currentUser=null;currentProfile=null;showGuest();});}
sb.auth.getSession().then(function(r){if(r.data.session){currentUser=r.data.session.user;loadProfile();}else{showGuest();}});
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++)r[i].unregister();});caches.keys().then(function(n){for(var i=0;i<n.length;i++)caches.delete(n[i]);});}
</script>
